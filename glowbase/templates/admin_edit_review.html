{% extends "base.html" %}

{% block content %}

<section class="page-header">
    <h1>Edit Review</h1>
    <p>Update a MongoDB review document.</p>
</section>

<section class="container">

    <div class="admin-actions">
        <a href="/admin/dashboard" class="secondary-link">Back to Dashboard</a>
        <a href="/admin/reviews" class="secondary-link">Back to Reviews</a>
    </div>

    <form method="POST"
          action="/admin/reviews/edit/{{ review._id }}"
          class="form-card"
          onsubmit="return confirm('Are you sure you want to update this review?');">

        <label>Product</label>
        <input type="text" value="{{ review.product_name }}" disabled>

        <label>Brand</label>
        <input type="text" value="{{ review.brand_name }}" disabled>

        <label>Rating</label>
        <select name="rating" required>
            <option value="5" {% if review.rating == 5 %}selected{% endif %}>5</option>
            <option value="4" {% if review.rating == 4 %}selected{% endif %}>4</option>
            <option value="3" {% if review.rating == 3 %}selected{% endif %}>3</option>
            <option value="2" {% if review.rating == 2 %}selected{% endif %}>2</option>
            <option value="1" {% if review.rating == 1 %}selected{% endif %}>1</option>
        </select>

        <label>Recommended?</label>
        <select name="is_recommended" required>
            <option value="1" {% if review.is_recommended == 1 %}selected{% endif %}>Yes</option>
            <option value="0" {% if review.is_recommended == 0 %}selected{% endif %}>No</option>
        </select>

        <label>Review Title</label>
        <input type="text" name="review_title" value="{{ review.review_title }}">

        <label>Review Text</label>
        <textarea name="review_text" rows="6">{{ review.review_text }}</textarea>

        <button type="submit">Update Review</button>
        <a href="/admin/reviews" class="secondary-link">Cancel</a>

    </form>

</section>

{% endblock %}
