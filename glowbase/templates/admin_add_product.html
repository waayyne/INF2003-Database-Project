{% extends "base.html" %}

{% block content %}

<section class="page-header">
    <h1>Add Product</h1>
    <p>Add a new product record into MariaDB.</p>
</section>

<section class="container">

    <form method="POST" action="/admin/products/add" class="form-card">

        <label>Product ID</label>
        <input type="text" name="product_id" required placeholder="Example: P999999">

        <label>Product Name</label>
        <input type="text" name="product_name" required>

        <label>Brand Name</label>
        <input type="text" name="brand_name" required>

        <label>Primary Category</label>
        <input type="text" name="primary_category" required placeholder="Example: Skincare">

        <label>Price USD</label>
        <input type="number" step="0.01" name="price_usd" required>

        <label>Rating</label>
        <input type="number" step="0.1" min="0" max="5" name="rating" value="0">

        <label>Size</label>
        <input type="text" name="size" placeholder="Example: 50ml">

        <label>Out of Stock</label>
        <select name="out_of_stock">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>Ingredients</label>
        <textarea name="ingredients" rows="4"></textarea>

        <label>Highlights</label>
        <textarea name="highlights" rows="4"></textarea>

        <button type="submit">Add Product</button>
        <a href="/admin/products" class="secondary-link">Cancel</a>

    </form>

</section>

{% endblock %}
