{% extends "base.html" %}

{% block content %}

<section class="form-page review-form-page">
    <div class="container form-page-container">
        <form method="POST" action="/admin/products/add" class="form-card review-form-card">
            <div class="form-card-heading">
                <div class="form-heading-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 5v14"></path>
                        <path d="M5 12h14"></path>
                    </svg>
                </div>
                <div>
                    <h1>Add Product</h1>
                    <p>Create a new product record in MariaDB.</p>
                </div>
            </div>

            <div class="form-divider"></div>

            <div class="form-two-column">
                <div class="field-group">
                    <label>Product ID</label>
                    <input type="text" name="product_id" required placeholder="Example: P999999">
                </div>

                <div class="field-group">
                    <label>Product Name</label>
                    <input type="text" name="product_name" required placeholder="Product name">
                </div>

                <div class="field-group">
                    <label>Brand Name</label>
                    <input type="text" name="brand_name" required placeholder="Brand">
                </div>

                <div class="field-group">
                    <label>Primary Category</label>
                    <input type="text" name="primary_category" required placeholder="Example: Skincare">
                </div>

                <div class="field-group">
                    <label>Price USD</label>
                    <input type="number" step="0.01" name="price_usd" required placeholder="0.00">
                </div>

                <div class="field-group">
                    <label>Rating</label>
                    <input type="number" step="0.1" min="0" max="5" name="rating" value="0">
                </div>

                <div class="field-group">
                    <label>Size</label>
                    <input type="text" name="size" placeholder="Example: 50ml">
                </div>

                <div class="field-group">
                    <label>Out of Stock</label>
                    <select name="out_of_stock">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
            </div>

            <div class="field-group">
                <label>Ingredients</label>
                <textarea name="ingredients" rows="4" placeholder="Optional"></textarea>
            </div>

            <div class="field-group">
                <label>Highlights</label>
                <textarea name="highlights" rows="4" placeholder="Optional"></textarea>
            </div>

            <button type="submit" class="wide-submit">Add Product</button>
            <p class="form-footnote">
                Need to stop? <a href="/admin/products">Return to product list</a>.
            </p>
        </form>
    </div>
</section>

{% endblock %}
