{% extends "base.html" %}

{% block content %}

<section class="form-page review-form-page">
    <div class="container form-page-container">
        <form method="POST" action="/admin/products/add" class="form-card review-form-card">
            <div class="form-card-heading">
                <div class="form-heading-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 5v14"></path>
                        <path d="M5 12h14"></path>
                    </svg>
                </div>
                <div>
                    <h1>Add Product</h1>
                    <p>Create a new product record in MariaDB.</p>
                </div>
            </div>

            {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
            {% endif %}

            <div class="form-divider"></div>

            <div class="form-two-column">
                <div class="field-group">
                    <label>Product ID</label>
                    <input 
                        type="text" 
                        name="product_id" 
                        required 
                        placeholder="Example: P999999"
                        value="{{ form.product_id if form else '' }}"
                    >
                </div>

                <div class="field-group">
                    <label>Product Name</label>
                    <input 
                        type="text" 
                        name="product_name" 
                        required 
                        placeholder="Product name"
                        value="{{ form.product_name if form else '' }}"
                    >
                </div>

                <div class="field-group">
                    <label>Brand Name</label>
                    <input 
                        type="text" 
                        name="brand_name" 
                        required 
                        placeholder="Brand"
                        value="{{ form.brand_name if form else '' }}"
                    >
                </div>

                <div class="field-group">
                    <label>Primary Category</label>
                    <input 
                        type="text" 
                        name="primary_category" 
                        required 
                        placeholder="Example: Skincare"
                        value="{{ form.primary_category if form else '' }}"
                    >
                </div>

                <div class="field-group">
                    <label>Price USD</label>
                    <input 
                        type="number" 
                        step="0.01" 
                        name="price_usd" 
                        required 
                        placeholder="0.00"
                        value="{{ form.price_usd if form else '' }}"
                    >
                </div>

                <div class="field-group">
                    <label>Rating</label>
                    <input 
                        type="number" 
                        step="0.01" 
                        min="0" 
                        max="5" 
                        name="rating" 
                        value="{{ form.rating if form else '0' }}"
                    >
                </div>

                <div class="field-group">
                    <label>Size</label>
                    <input 
                        type="text" 
                        name="size" 
                        placeholder="Example: 50ml"
                        value="{{ form.size if form else '' }}"
                    >
                </div>

                <div class="field-group">
                    <label>Out of Stock</label>
                    <select name="out_of_stock">
                        <option value="0" {% if not form or form.out_of_stock == "0" %}selected{% endif %}>No</option>
                        <option value="1" {% if form and form.out_of_stock == "1" %}selected{% endif %}>Yes</option>
                    </select>
                </div>
            </div>

            <div class="field-group">
                <label>Ingredients</label>
                <textarea name="ingredients" rows="4" placeholder="Optional">{{ form.ingredients if form else '' }}</textarea>
            </div>

            <div class="field-group">
                <label>Highlights</label>
                <textarea name="highlights" rows="4" placeholder="Optional">{{ form.highlights if form else '' }}</textarea>
            </div>

            <button type="submit" class="wide-submit">Add Product</button>
            <p class="form-footnote">
                Need to stop? <a href="/admin/products">Return to product list</a>.
            </p>
        </form>
    </div>
</section>

{% endblock %}
