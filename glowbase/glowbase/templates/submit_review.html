{% extends "base.html" %}

{% block content %}

<section class="form-page review-form-page">
    <div class="container form-page-container">
        <form method="POST" action="/submit-review" class="form-card review-form-card">
            <div class="form-card-heading">
                <div class="form-heading-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
                    </svg>
                </div>
                <div>
                    <h1>Submit Product Review</h1>
                    <p>Share a product review without creating an account.</p>
                </div>
            </div>

            <div class="form-divider"></div>

            <div class="form-two-column">
                <div class="field-group">
                    <label>Your Name</label>
                    <input type="text" name="author_name" required placeholder="Enter your name">
                </div>

                <div class="field-group">
                    <label>Product</label>
                    <select name="product_id" required>
                        <option value="">Select Product</option>
                        {% for product in products %}
                            <option value="{{ product.product_id }}">{{ product.product_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field-group">
                    <label>Rating</label>
                    <select name="rating" required>
                        <option value="">Select Rating</option>
                        <option value="5">5 - Excellent</option>
                        <option value="4">4 - Good</option>
                        <option value="3">3 - Average</option>
                        <option value="2">2 - Poor</option>
                        <option value="1">1 - Very Poor</option>
                    </select>
                </div>

                <div class="field-group">
                    <label>Recommended?</label>
                    <select name="is_recommended" required>
                        <option value="">Select Option</option>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>
            </div>

            <div class="field-group">
                <label>Review Title</label>
                <input type="text" name="review_title" required placeholder="Summarize your experience">
            </div>

            <div class="field-group">
                <label>Review Text</label>
                <textarea name="review_text" rows="6" required placeholder="Write your review here..."></textarea>
            </div>

            <div class="form-two-column">
                <div class="field-group">
                    <label>Skin Type</label>
                    <select name="skin_type">
                        <option value="">Prefer not to say</option>
                        <option value="dry">Dry</option>
                        <option value="oily">Oily</option>
                        <option value="combination">Combination</option>
                        <option value="normal">Normal</option>
                        <option value="sensitive">Sensitive</option>
                    </select>
                </div>

                <div class="field-group">
                    <label>Skin Tone</label>
                    <select name="skin_tone">
                        <option value="">Prefer not to say</option>
                        <option value="fair">Fair</option>
                        <option value="light">Light</option>
                        <option value="medium">Medium</option>
                        <option value="tan">Tan</option>
                        <option value="deep">Deep</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="wide-submit">Submit Review</button>
            <p class="form-footnote">Your review helps others make better choices. Thank you!</p>
        </form>
    </div>
</section>

{% endblock %}
